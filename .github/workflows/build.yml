name: Build FFmpeg (macOS, OpenSSL)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: "FFmpeg version to build"
        required: true
        default: "8.1.2"
  push:
    tags:
      - "v*"

env:
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '8.1.2' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel

    runs-on: ${{ matrix.runner }}
    name: Build FFmpeg ${{ matrix.arch }}

    steps:
      - name: Remove X11 and other Homebrew contamination
        run: |
          brew uninstall --ignore-dependencies libx11 libxcb libxau libxdmcp xorgproto x264 2>/dev/null || true
          # Remove any leftover X11 pkg-config files
          rm -f /usr/local/lib/pkgconfig/x11*.pc /usr/local/lib/pkgconfig/xcb*.pc /opt/homebrew/lib/pkgconfig/x11*.pc /opt/homebrew/lib/pkgconfig/xcb*.pc 2>/dev/null || true
          # Remove leftover X11 libraries to prevent detection
          rm -rf /usr/local/opt/libx11 /usr/local/opt/libxcb /opt/homebrew/opt/libx11 /opt/homebrew/opt/libxcb 2>/dev/null || true

      - name: Install build tools
        run: |
          brew install pkg-config nasm

      - name: Build OpenSSL from source (static only)
        run: |
          OPENSSL_TARGET=$(uname -m | sed 's/arm64/darwin64-arm64/;s/x86_64/darwin64-x86_64/')
          echo "OpenSSL target: ${OPENSSL_TARGET}"
          curl -L "https://github.com/openssl/openssl/releases/download/openssl-3.4.1/openssl-3.4.1.tar.gz" -o openssl.tar.gz
          tar xf openssl.tar.gz
          cd openssl-3.4.1
          ./Configure "${OPENSSL_TARGET}" no-shared no-dso no-tests --prefix=/tmp/openssl-static
          make -j$(sysctl -n hw.ncpu)
          make install_sw
          echo "OPENSSL_STATIC=/tmp/openssl-static" >> $GITHUB_ENV

      - name: Build x264 from source (static, no X11)
        env:
          PKG_CONFIG_LIBDIR: /dev/null
          X11: no
        run: |
          git clone --depth 1 https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure \
            --enable-static \
            --disable-shared \
            --disable-opencl \
            --disable-cli
          make -j$(sysctl -n hw.ncpu)
          sudo make install
          mkdir -p /tmp/custom-pkgconfig
          cat > /tmp/custom-pkgconfig/x264.pc << 'PCEOF'
          prefix=/usr/local
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: x264
          Description: H.264 encoder
          Version: 0.164
          Libs: -L${libdir} -lx264
          Cflags: -I${includedir}
          PCEOF

      - name: Download FFmpeg source
        run: |
          curl -L "https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz" -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          mv ffmpeg-${{ env.FFMPEG_VERSION }} ffmpeg-src

      - name: Configure FFmpeg
        working-directory: ffmpeg-src
        env:
          PKG_CONFIG_LIBDIR: /tmp/custom-pkgconfig
        run: |
          ./configure \
            --enable-openssl \
            --enable-nonfree \
            --enable-gpl \
            --enable-libx264 \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-encoders \
            --enable-encoder=aac \
            --enable-encoder=libx264 \
            --enable-encoder=flv \
            --disable-decoders \
            --enable-decoder=aac \
            --enable-decoder=h264 \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s32le \
            --enable-decoder=pcm_f32le \
            --enable-decoder=mp3 \
            --enable-decoder=png \
            --disable-muxers \
            --enable-muxer=flv \
            --disable-demuxers \
            --enable-demuxer=pcm_s16le \
            --enable-demuxer=pcm_s32le \
            --enable-demuxer=pcm_f32le \
            --enable-demuxer=wav \
            --enable-demuxer=mp3 \
            --enable-demuxer=image2 \
            --enable-demuxer=lavfi \
            --disable-protocols \
            --enable-protocol=rtmp \
            --enable-protocol=rtmps \
            --enable-protocol=tcp \
            --enable-protocol=udp \
            --enable-protocol=tls \
            --enable-protocol=https \
            --enable-protocol=http \
            --enable-protocol=pipe \
            --enable-protocol=file \
            --enable-static \
            --disable-shared \
            --extra-cflags="-I${OPENSSL_STATIC}/include" \
            --extra-ldflags="-L${OPENSSL_STATIC}/lib"

      - name: Build FFmpeg
        working-directory: ffmpeg-src
        run: make -j$(sysctl -n hw.ncpu)

      - name: Verify build (must have NO Homebrew dependencies)
        working-directory: ffmpeg-src
        run: |
          echo "=== FFmpeg version ==="
          ./ffmpeg -version 2>&1 | head -5
          echo "=== Dynamic dependencies ==="
          otool -L ./ffmpeg
          echo "=== Checking for forbidden dependencies ==="
          if otool -L ./ffmpeg | grep -i "libxcb\|libx11\|/opt/homebrew\|/usr/local/opt"; then
            echo "ERROR: Binary has forbidden dynamic dependencies!"
            exit 1
          fi
          echo "=== TLS protocols ==="
          ./ffmpeg -protocols 2>&1 | grep -i "tls\|rtmp" || true
          echo "=== Encoders ==="
          ./ffmpeg -encoders 2>&1 | grep -i "aac\|x264\|flv" || true
          echo "Build verification passed!"

      - name: Package
        run: |
          mkdir -p output
          cp ffmpeg-src/ffmpeg output/ffmpeg
          chmod +x output/ffmpeg
          cd output
          zip "ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}.zip" ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}
          path: output/ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}.zip

  universal:
    needs: build
    runs-on: macos-15
    name: Create universal binary

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-arm64
          path: arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-x86_64
          path: x86_64

      - name: Extract and combine
        run: |
          mkdir -p output
          cd arm64 && unzip *.zip && cd ..
          cd x86_64 && unzip *.zip && cd ..
          lipo -create arm64/ffmpeg x86_64/ffmpeg -output output/ffmpeg
          chmod +x output/ffmpeg
          echo "=== Universal binary ==="
          file output/ffmpeg
          lipo -info output/ffmpeg
          echo "=== Dependencies check ==="
          if otool -L output/ffmpeg | grep -i "libxcb\|libx11\|/opt/homebrew\|/usr/local/opt"; then
            echo "ERROR: Universal binary has forbidden dynamic dependencies!"
            exit 1
          fi
          echo "Universal binary verification passed!"
          cd output
          zip "ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal.zip" ffmpeg

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal
          path: output/ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal.zip

  release:
    needs: universal
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.FFMPEG_VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/ffmpeg-*-macos-arm64/*.zip
            artifacts/ffmpeg-*-macos-x86_64/*.zip
            artifacts/ffmpeg-*-macos-universal/*.zip
          body: |
            FFmpeg ${{ env.FFMPEG_VERSION }} for macOS with OpenSSL (RTMPS support).

            - `ffmpeg-*-macos-arm64.zip` - Apple Silicon (M1/M2/M3/M4)
            - `ffmpeg-*-macos-x86_64.zip` - Intel
            - `ffmpeg-*-macos-universal.zip` - Universal (both)

            Fully static build: OpenSSL + x264 from source, zero Homebrew runtime dependencies.
