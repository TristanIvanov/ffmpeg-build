name: Build FFmpeg (macOS, OpenSSL)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: "FFmpeg version to build"
        required: true
        default: "7.1.1"
  push:
    tags:
      - "v*"

env:
  FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '7.1.1' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-13

    runs-on: ${{ matrix.runner }}
    name: Build FFmpeg ${{ matrix.arch }}

    steps:
      - name: Install dependencies
        run: brew install openssl pkg-config nasm

      - name: Download FFmpeg source
        run: |
          curl -L "https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz" -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          mv ffmpeg-${{ env.FFMPEG_VERSION }} ffmpeg-src

      - name: Configure FFmpeg
        working-directory: ffmpeg-src
        run: |
          OPENSSL_DIR=$(brew --prefix openssl)
          export PKG_CONFIG_PATH="${OPENSSL_DIR}/lib/pkgconfig:${PKG_CONFIG_PATH}"
          ./configure \
            --enable-openssl \
            --enable-nonfree \
            --enable-gpl \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libvorbis \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --enable-static \
            --disable-shared \
            --extra-cflags="-I${OPENSSL_DIR}/include" \
            --extra-ldflags="-L${OPENSSL_DIR}/lib" \
            --pkg-config-flags="--static"

      - name: Build FFmpeg
        working-directory: ffmpeg-src
        run: make -j$(sysctl -n hw.ncpu)

      - name: Verify OpenSSL linkage
        working-directory: ffmpeg-src
        run: |
          echo "=== Checking TLS backend ==="
          ./ffmpeg -version 2>&1 | grep -i "openssl\|tls\|configuration" || true
          echo "=== Verifying binary ==="
          file ./ffmpeg

      - name: Package
        run: |
          mkdir -p output
          cp ffmpeg-src/ffmpeg output/ffmpeg
          chmod +x output/ffmpeg
          cd output
          zip "ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}.zip" ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}
          path: output/ffmpeg-${{ env.FFMPEG_VERSION }}-macos-${{ matrix.arch }}.zip

  universal:
    needs: build
    runs-on: macos-15
    name: Create universal binary

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-arm64
          path: arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-x86_64
          path: x86_64

      - name: Extract and combine
        run: |
          mkdir -p output
          cd arm64 && unzip *.zip && cd ..
          cd x86_64 && unzip *.zip && cd ..
          lipo -create arm64/ffmpeg x86_64/ffmpeg -output output/ffmpeg
          chmod +x output/ffmpeg
          echo "=== Universal binary info ==="
          file output/ffmpeg
          lipo -info output/ffmpeg
          cd output
          zip "ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal.zip" ffmpeg

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal
          path: output/ffmpeg-${{ env.FFMPEG_VERSION }}-macos-universal.zip

  release:
    needs: universal
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/ffmpeg-*-macos-arm64/*.zip
            artifacts/ffmpeg-*-macos-x86_64/*.zip
            artifacts/ffmpeg-*-macos-universal/*.zip
          body: |
            FFmpeg ${{ env.FFMPEG_VERSION }} builds for macOS with OpenSSL (RTMPS support).

            - `ffmpeg-*-macos-arm64.zip` - Apple Silicon (M1/M2/M3/M4)
            - `ffmpeg-*-macos-x86_64.zip` - Intel
            - `ffmpeg-*-macos-universal.zip` - Universal (both)

            These binaries are drop-in replacements for the ffmpeg-sidecar download.
            They use OpenSSL instead of Apple Secure Transport, enabling RTMPS streaming.
